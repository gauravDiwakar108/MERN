<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Real State</title>
</head>

<body>
    <header class="header">
        <nav class="nav">
            <ul class="navbar">
                <li class="nav-link"><a href="#">Home</a></li>
                <li class="nav-link"><a href="#">Landing</a></li>
                <li class="nav-link"><a href="#">About</a></li>
                <li class="nav-link"><a href="#">Team</a></li>
                <li class="nav-link"><a href="#">Gallery</a></li>
                <li class="nav-link"><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="main">
        <div class="hero">
            <div class="hero-content">
                <h2 class="hero-heading">Easy Way to Find a Perfect Property</h2>
                <p class="hero-para">Sample Text. Click to Select the Text Element.</p>
                <p class="hero-freepik">Image from <strong>Freepik</strong></p>

                <div class="hero-search-container">
                    <input type="search" name="" id="search-bar" placeholder="Enter a Valid address">
                    <button class="submit-button">SUBMIT</button>
                </div>
            </div>
        </div>

        <div class="property-container">
            <div class="slider-container">
                <div class="img-container">
                    <img src="/images/paris.jpeg" alt="paris">
                    <p class="city-name">Paris</p>
                    <p class="property-count">10 Property</p>
                </div>
                <div class="img-container">
                    <img src="/images/new_york.jpeg" alt="new_york">
                    <p class="city-name">New York</p>
                    <p class="property-count">40 Property</p>
                </div>
                <div class="img-container">
                    <img src="/images/la.jpeg" alt="los-angelos">
                    <p class="city-name">Los Angelos</p>
                    <p class="property-count">34 Property</p>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
