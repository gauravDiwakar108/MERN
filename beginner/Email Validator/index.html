<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>My Email Validator</title>
</head>
<body>
    
    <header>
        <nav>
            <div class="logo">
                iValidate
            </div>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="container">
            <h1>Enter your Email to Validate</h1>

            <form action="/submit" method="post">
                <!-- <label for="username">Email: </label> -->
                <br>
                <input type="text" id="username" name="username" required placeholder="abc@example.com">
                <br><br>

                <input id="submitBtn" type="submit" value="Submit" class="btn">
            </form>
        </div>

        <div class="container">
            <h2>Your Results</h2>
            <div id="resultCont">

            </div>
        </div>
    </main>
    <footer>
        Copyright iValidate.com | All right Reserved
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
