<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>My Survay Page</title>
</head>

<body>

    <div class="main">

        <h1 class="title">Survay Form</h1>

        <form action="#" class="my-form">

            <div class="form-area">
                <label for="name">Name</label>
                <input type="text" name="name" id="name">
            </div>

            <div class="form-area">
                <label for="email">Email</label>
                <input type="email" name="email" id="email">
            </div>

            <div class="form-area">
                <label for="age">Age</label>
                <input type="number" name="age" id="age">
            </div>

            <div class="form-area">
                <h3>Which Option describe you best?</h3>
                <select name="option" id="option">
                    <option value="student">Student</option>
                    <option value="professional">Professional</option>
                    <option value="retired">Retired</option>
                </select>
            </div>

            <div class="form-area">
                <h3>Which Option describe you best?</h3>

                <label for="yes">
                    <input type="radio" name="recommand" id="yes"> Yes
                </label>

                <label for="no">
                    <input type="radio" name="recommand" id="no"> No
                </label>

                <label for="maybe">
                    <input type="radio" name="recommand" id="maybe"> Maybe
                </label>
            </div>

            <div class="form-area">
                <h3>Language and Frameworks known <span>(Check all that apply)</span></h3>
                <label for="inp-1">
                    <input type="checkbox" name="inp"> C
                </label>

                <label for="inp-2">
                    <input type="checkbox" name="inp"> C++
                </label>

                <label for="inp-3">
                    <input type="checkbox" name="inp"> C#
                </label>

                <label for="inp-4">
                    <input type="checkbox" name="inp"> Java
                </label>

                <label for="inp-5">
                    <input type="checkbox" name="inp"> Python
                </label>

                <label for="inp-6">
                    <input type="checkbox" name="inp"> JavaScript
                </label>

                <label for="inp-7">
                    <input type="checkbox" name="inp"> React
                </label>

                <label for="inp-8">
                    <input type="checkbox" name="inp"> Angular
                </label>

                <label for="inp-9">
                    <input type="checkbox" name="inp"> Django
                </label>

                <label for="inp-10">
                    <input type="checkbox" name="inp"> Spring
                </label>
            </div>

            <div class="form-area">
                <h3>Any comments or suggestions</h3>
                <textarea name="" id=""></textarea>
                <button>Submit</button>
            </div>

        </form>
    </div>
</body>

</html>
